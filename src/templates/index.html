<!DOCTYPE html>
<html>
<head>
    <title>ChainSleuth</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-2xl shadow-lg w-96 text-center">
    <h1 class="text-2xl font-bold mb-4">🔍 ChainSleuth</h1>
    <p class="text-gray-500 mb-6">Blockchain Investigation Tool</p>

    <form method="POST">
        <input 
            type="text" 
            name="wallet" 
            placeholder="Enter wallet address"
            class="w-full p-3 border rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-400"
            required
        >
        <button 
            class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition">
            Start Investigation
        </button>
    </form>
</div>

</body>
</html>
